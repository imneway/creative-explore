<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Drafts</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f5f5f5;font-family:-apple-system,system-ui,sans-serif;padding:40px;color:#333;max-width:1200px;margin:0 auto}
  h1{font-size:26px;font-weight:700;margin-bottom:4px}
  .sub{font-size:13px;color:#888;margin-bottom:10px}
  .colors{display:flex;gap:6px;margin-bottom:36px;align-items:center;font-size:11px;color:#999}
  .colors .dot{width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.08)}
  .dir{margin-bottom:48px}
  .dir-title{font-size:18px;font-weight:600;margin-bottom:3px}
  .dir-meta{font-size:11px;color:#999;margin-bottom:4px}
  .dir-desc{font-size:13px;color:#666;line-height:1.5;margin-bottom:12px}
  .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.05)}
  .card img.main{width:100%;border-radius:8px;margin-bottom:10px;background:#eee}
  .model{font-size:11px;font-weight:600;margin-bottom:8px}
  .inputs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
  .inputs a img{height:40px;border-radius:3px;border:1px solid #ddd}
  .inputs .none{font-size:11px;color:#bbb;font-style:italic}
  .pbox{background:#f8f8f8;border:1px solid #e8e8e8;border-radius:6px;padding:10px}
  .pbox .lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
  .pbox pre{font-size:11px;color:#555;line-height:1.5;white-space:pre-wrap;word-break:break-word;font-family:'SF Mono',Menlo,Consolas,monospace}
</style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script>
const d=DATA,a=d.accent||'#666';
let h=`<h1>${d.title}</h1><div class="sub">${d.subtitle}</div>`;
if(d.colors&&d.colors.length){
  h+='<div class="colors"><span>Brand:</span>';
  d.colors.forEach(c=>{h+=`<div class="dot" style="background:${c}"></div><span>${c}</span>`});
  h+='</div>';
}
d.directions.forEach(x=>{
  let inp='';
  if(x.inputs&&x.inputs.length){
    x.inputs.forEach(i=>{inp+=`<a href="${i.url}" target="_blank"><img src="${i.url}" title="${i.label}"></a>`});
  }else{inp='<span class="none">None — pure text prompt</span>'}
  h+=`<div class="dir">
    <div class="dir-title" style="color:${a}">${x.name}</div>
    <div class="dir-meta">${x.meta||''}</div>
    <div class="dir-desc">${x.desc}</div>
    <div class="card">
      <img class="main" src="${x.image}">
      <div class="model" style="color:${a}">${x.model}</div>
      <div class="inputs">${inp}</div>
      <div class="pbox" style="background:${a}08;border-color:${a}20">
        <div class="lbl" style="color:${a}">Prompt</div>
        <pre>${x.prompt}</pre>
      </div>
    </div>
  </div>`;
});
document.getElementById('app').innerHTML=h;
document.title=d.title;
</script>
</body>
</html>
